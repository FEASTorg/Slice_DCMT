; PlatformIO Project Configuration File

[platformio]
default_envs = gen1_nano

[env]
platform = atmelavr
board = nanoatmega328new
framework = arduino
upload_speed = 115200
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    cameronbrooks11/CRUMBS @ ^0.11.0
    cameronbrooks11/bread-crumbs-contracts @ ^0.2.0
    paulstoffregen/Encoder @ ^1.4.4
build_flags =
    -DCRUMBS_MAX_HANDLERS=12
    ; override for flashed board address:
    ; -DI2C_ADR=21
    ; optional speed-loop override (default: nano=0, nano_every=1):
    ; -DDCMT_ENABLE_SPEED_LOOP=1

[env:gen1_nano]
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1

[env:gen2_nano]
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2

; ----- Arduino Nano Every variants -----
[env:gen1_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1

[env:gen2_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
