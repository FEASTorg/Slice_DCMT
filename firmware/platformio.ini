; PlatformIO Project Configuration File

[platformio]
default_envs = gen1_nano
; Optional local overlay (uncomment for local-only overrides):
; extra_configs = platformio.local.ini

[env]
framework = arduino
upload_speed = 115200
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    cameronbrooks11/CRUMBS @ ^0.11.0
    cameronbrooks11/bread-crumbs-contracts @ ^
    cameronbrooks11/LMD18200 @ ^0.1.3
    cameronbrooks11/DCMotorServo @ ^1.0.1
    paulstoffregen/Encoder @ ^1.4.4
build_flags =
    -DCRUMBS_MAX_HANDLERS=12
    ; override for flashed board address:
    ; -DI2C_ADR=21
    ; enable debug serial output:
    ; -DSLICE_DEBUG=1
    ; optional speed-loop override (default: nano=0, nano_every=1):
    ; -DDCMT_ENABLE_SPEED_LOOP=1

[env:nano_base]
platform = atmelavr
board = nanoatmega328new

[env:nanoevery_base]
platform = atmelmegaavr
board = nano_every

[env:gen1_nano]
extends = env:nano_base
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1

[env:gen2_nano]
extends = env:nano_base
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2

; ----- Arduino Nano Every variants -----
[env:gen1_nanoevery]
extends = env:nanoevery_base
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1

[env:gen2_nanoevery]
extends = env:nanoevery_base
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
