; PlatformIO Project Configuration File

[platformio]
default_envs = gen1_open

[env]
platform = atmelavr
board = nanoatmega328new
framework = arduino
upload_speed = 115200
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    cameronbrooks11/CRUMBS @ ^0.11.0
    paulstoffregen/Encoder @ ^1.4.4
build_flags =
    -DCRUMBS_MAX_HANDLERS=8

[env:gen1_open]
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1
    -DDCMT_FEATURE_CLOSED_LOOP=0

[env:gen2_open]
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
    -DDCMT_FEATURE_CLOSED_LOOP=0

[env:gen2_closed]
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
    -DDCMT_FEATURE_CLOSED_LOOP=1

; ----- Arduino Nano Every variants -----
[env:gen1_open_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=1
    -DDCMT_FEATURE_CLOSED_LOOP=0

[env:gen2_open_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
    -DDCMT_FEATURE_CLOSED_LOOP=0

[env:gen2_closed_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DDCMT_HW_GEN=2
    -DDCMT_FEATURE_CLOSED_LOOP=1
